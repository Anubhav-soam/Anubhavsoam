<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blog — Anubhav Soam</title>
  <link rel="stylesheet" href="blog-styles.css">
</head>
<body>

  <!-- Animated blobs background -->
  <div class="blog-bg">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
  </div>

  <!-- Navbar -->
  <div class="blog-wrapper">
    <nav class="blog-nav">
      <div class="nav-brand">✦ Anubhav's Blog</div>
      <div class="nav-actions">
        <button class="btn btn-admin" id="adminBtn" onclick="toggleAdmin()">⚙ Admin</button>
      </div>
    </nav>

    <!-- Dynamic Blog Content -->
    <div id="blogRoot"></div>
  </div>

  <!-- Floating Action Button -->
  <button class="fab" id="fab" onclick="state.view==='topics'?openTopicModal():openPostModal()" title="New post">＋</button>

  <!-- Modal Overlay -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal-box" id="modalBox"></div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <script src="blog-app.js"></script>
</body>
</html>
