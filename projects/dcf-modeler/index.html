<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Projects | DCF Modeler</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=DM+Mono:wght@300;400;500&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../styles.css" />
  <link rel="stylesheet" href="./dcf.css" />
</head>
<body>
  <header class="site-topbar">
    <div class="site-title">Anubhav Soam · DCF Modeler</div>
    <div class="site-topbar-links">
      <a class="site-pill-link" href="../../">Portfolio</a>
      <a class="site-pill-link" href="../">All Projects</a>
      <button id="theme-toggle" class="theme-toggle" type="button" aria-label="Toggle light and dark mode">🌙 Dark</button>
    </div>
  </header>

  <main class="dcf-shell">
    <section class="dcf-card">
      <h1>Discounted Cash Flow (Live API)</h1>
      <p class="dcf-muted">Backend connected to Render deployment.</p>

      <div class="dcf-grid">
        <label>Company Symbol
          <input id="symbol" placeholder="RELIANCE.NS" value="RELIANCE.NS" />
        </label>
        <label>Revenue Growth (%)
          <input id="growth" type="number" step="0.01" placeholder="Auto from history" />
        </label>
        <label>EBIT Margin (%)
          <input id="ebit_margin" type="number" step="0.01" placeholder="Auto from history" />
        </label>
        <label>Depreciation as Revenue (%)
          <input id="depr_pct" type="number" step="0.01" placeholder="Auto / default" />
        </label>
        <label>NWC as Revenue (%)
          <input id="nwc_pct" type="number" step="0.01" placeholder="Auto / default" />
        </label>
        <label>Capex as Revenue (%)
          <input id="capex_pct" type="number" step="0.01" placeholder="Auto / default" />
        </label>
        <label>Outstanding Shares
          <input id="shares" type="number" step="1" placeholder="Auto from market data" />
        </label>
        <label>WACC (%)
          <input id="wacc" type="number" step="0.01" value="12" />
        </label>
        <label>Terminal Growth (%)
          <input id="terminal_growth" type="number" step="0.01" value="3" />
        </label>
        <label>Tax (%)
          <input id="tax" type="number" step="0.01" value="18" />
        </label>
      </div>

      <div class="dcf-actions">
        <button class="btn btn-blue" type="button" onclick="getDCF()">Calculate DCF</button>
      </div>

      <div class="kpi-row" style="margin-top:1rem;">
        <article><span>Enterprise Value</span><strong id="evOut">—</strong></article>
        <article><span>Equity Value</span><strong id="eqOut">—</strong></article>
        <article><span>Value Per Share</span><strong id="psOut">—</strong></article>
      </div>

      <p id="result" class="dcf-status" style="margin-top:1rem;"></p>

      <div style="margin-top:1rem;overflow:auto;">
        <table id="sensTable"></table>
      </div>
    </section>
  </main>

  <script src="./dcf.js"></script>
</body>
</html>
